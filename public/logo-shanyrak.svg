<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Шаңырақ (Shanyrak) - outer circle -->
  <circle cx="24" cy="24" r="21" stroke="#555" stroke-width="2.8" fill="none"/>

  <!-- Шаңырақ cross beams -->
  <line x1="24" y1="3" x2="24" y2="45" stroke="#555" stroke-width="1.8"/>
  <line x1="3" y1="24" x2="45" y2="24" stroke="#555" stroke-width="1.8"/>

  <!-- Шаңырақ diagonal beams -->
  <line x1="8.5" y1="8.5" x2="39.5" y2="39.5" stroke="#555" stroke-width="1.3"/>
  <line x1="39.5" y1="8.5" x2="8.5" y2="39.5" stroke="#555" stroke-width="1.3"/>

  <!-- Inner circle (шаңырақ center ring) -->
  <circle cx="24" cy="24" r="12.5" stroke="#555" stroke-width="2.2" fill="#fff"/>

  <!-- Background fill for stones area -->
  <circle cx="24" cy="24" r="11.5" fill="#666"/>

  <!-- 9 qumalaq (stones) — 3x3 grid -->
  <circle cx="18.5" cy="18.5" r="2.5" fill="#fff"/>
  <circle cx="24" cy="18.5" r="2.5" fill="#fff"/>
  <circle cx="29.5" cy="18.5" r="2.5" fill="#fff"/>

  <circle cx="18.5" cy="24" r="2.5" fill="#fff"/>
  <circle cx="24" cy="24" r="2.5" fill="#fff"/>
  <circle cx="29.5" cy="24" r="2.5" fill="#fff"/>

  <circle cx="18.5" cy="29.5" r="2.5" fill="#fff"/>
  <circle cx="24" cy="29.5" r="2.5" fill="#fff"/>
  <circle cx="29.5" cy="29.5" r="2.5" fill="#fff"/>
</svg>
